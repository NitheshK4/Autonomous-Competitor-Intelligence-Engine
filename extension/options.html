<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Competitor Intel Extension Settings</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b0f19;
      color: #f8fafc;
      padding: 30px;
      margin: 0;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 480px;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    h2 {
      margin-top: 0;
      font-size: 20px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 12px;
      background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 10px;
      color: #f8fafc;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #38bdf8;
    }
    .btn {
      background: linear-gradient(135deg, #38bdf8 0%, #3b82f6 100%);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .alert {
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    .alert-success {
      background-color: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .alert-danger {
      background-color: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Chrome Extension Configurations</h2>
    
    <div id="statusBox" class="alert"></div>

    <div class="form-group">
      <label for="backendUrl">Backend Server Connection URL</label>
      <input type="url" id="backendUrl" placeholder="http://localhost:3000 or https://yourapp.up.railway.app">
      <p style="font-size: 11px; color: #64748b; margin-top: 4px;">
        The deployed Railway URL or local server endpoint.
      </p>
    </div>

    <div class="form-group">
      <label for="apiKey">Extension API Key</label>
      <input type="password" id="apiKey" placeholder="Copy this key from settings page of the web app">
    </div>

    <button id="saveBtn" class="btn">Verify and Save Settings</button>
  </div>

  <script src="options.js"></script>
</body>
</html>
